<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Live Map</title>

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{font-family:Arial;background:#0f2027;color:white;text-align:center}
.container{max-width:420px;margin:auto;padding:15px}
input,select,button{width:100%;padding:10px;margin:5px;border-radius:8px;border:none}
.in{background:#00c853;color:white}
#map{height:300px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>
<div class="container">
<h3>📍 QA Live Tracker</h3>

<input id="name" placeholder="Name">
<input id="id" placeholder="Employee ID">

<select id="purpose">
<option value="">Purpose</option>
<option>Inspection</option>
<option>Validation</option>
<option>Site Visit</option>
</select>

<button class="in" onclick="timeIn()">Time In</button>

<div id="map"></div>
</div>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdAUCeLfIrkhor2eb-EPuIFgozvlBsgCI",
  authDomain: "attendance-system-4dd97.firebaseapp.com",
  projectId: "attendance-system-4dd97",
  storageBucket: "attendance-system-4dd97.firebasestorage.app",
  messagingSenderId: "82851411696",
  appId: "1:82851411696:web:180069f935b584c19bb435"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// INIT MAP
let map = L.map('map').setView([15.5,120.9], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom: 19
}).addTo(map);

let markers = [];

// GET GPS
function getLocation(){
 return new Promise(resolve=>{
  navigator.geolocation.getCurrentPosition(pos=>{
   resolve({
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
   });
  },()=>alert("Enable GPS"));
 });
}

// TIME IN
window.timeIn = async function(){
 let namev = document.getElementById("name").value;
 let idv = document.getElementById("id").value;
 let purposev = document.getElementById("purpose").value;

 if(!namev||!idv||!purposev){
  alert("Fill all fields");
  return;
 }

 let loc = await getLocation();

 await addDoc(collection(db,"attendance"),{
  name:namev,
  id:idv,
  purpose:purposev,
  lat:loc.lat,
  lng:loc.lng,
  time:new Date().toLocaleString()
 });

 alert("✅ Saved");
}

// REALTIME MAP
onSnapshot(collection(db,"attendance"),(snapshot)=>{
 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 snapshot.forEach(doc=>{
  let r = doc.data();

  if(r.lat && r.lng){
   let m = L.marker([r.lat,r.lng]).addTo(map)
   .bindPopup(`<b>${r.name}</b><br>${r.purpose}`);
   markers.push(m);
  }
 });
});
</script>

</body>
</html>
