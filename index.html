<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Attendance</title>

<style>
body{font-family:Arial;background:#0f2027;color:white;text-align:center}
.container{max-width:400px;margin:auto;padding:20px}
input,select,button{width:100%;padding:10px;margin:5px;border-radius:8px;border:none}
.in{background:#00c853;color:white}
.out{background:#d50000;color:white}
table{width:100%;font-size:12px;margin-top:10px}
td,th{border:1px solid #fff3;padding:5px}
</style>
</head>

<body>
<div class="container">
<h3>📍 Realtime Attendance</h3>

<input id="name" placeholder="Name">
<input id="id" placeholder="Employee ID">

<select id="purpose">
<option value="">Purpose</option>
<option>Inspection</option>
<option>Validation</option>
<option>Site Visit</option>
</select>

<button class="in" onclick="timeIn()">Time In</button>
<button class="out" onclick="timeOut()">Time Out</button>

<h4>📊 Dashboard</h4>
<table>
<thead>
<tr>
<th>Name</th>
<th>Time In</th>
<th>Time Out</th>
<th>Location</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>
</div>

<script type="module">
// ✅ FIREBASE IMPORT (WORKING)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ YOUR CONFIG (NAKALAGAY NA)
const firebaseConfig = {
  apiKey: "AIzaSyBdAUCeLfIrkhor2eb-EPuIFgozvlBsgCI",
  authDomain: "attendance-system-4dd97.firebaseapp.com",
  projectId: "attendance-system-4dd97",
  storageBucket: "attendance-system-4dd97.firebasestorage.app",
  messagingSenderId: "82851411696",
  appId: "1:82851411696:web:180069f935b584c19bb435"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// TIME
function now(){
  return new Date().toLocaleString();
}

// GPS
function getLocation(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      resolve(`${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`);
    },()=>resolve("No GPS"));
  });
}

// TIME IN
window.timeIn = async function(){
  let namev = document.getElementById("name").value;
  let idv = document.getElementById("id").value;
  let purposev = document.getElementById("purpose").value;

  if(!namev || !idv || !purposev){
    alert("Fill all fields");
    return;
  }

  let loc = await getLocation();

  await addDoc(collection(db,"attendance"),{
    name:namev,
    id:idv,
    purpose:purposev,
    timeIn:now(),
    timeOut:"",
    location:loc
  });

  alert("✅ Time In saved");
}

// TIME OUT
window.timeOut = async function(){
  let idv = document.getElementById("id").value;

  const q = query(collection(db,"attendance"), where("id","==",idv));
  const snapshot = await getDocs(q);

  snapshot.forEach(async (d)=>{
    await updateDoc(doc(db,"attendance",d.id),{
      timeOut: now()
    });
  });

  alert("✅ Time Out updated");
}

// REALTIME VIEW
onSnapshot(collection(db,"attendance"),(snapshot)=>{
  let log = document.getElementById("log");
  log.innerHTML="";

  snapshot.forEach(doc=>{
    let r = doc.data();
    log.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.timeIn}</td>
      <td>${r.timeOut || "-"}</td>
      <td>${r.location}</td>
    </tr>`;
  });
});

</script>
</body>
</html>
